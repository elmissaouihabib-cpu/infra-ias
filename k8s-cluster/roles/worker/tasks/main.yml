---
# ============================================================
# Worker Role - Applied to worker nodes
# Steps:
#   1. Load join command from Ansible controller
#   2. Join the cluster via kubeadm
#   3. Verify node registration
# ============================================================

# ---- 1. Load join command -----------------------------------
- name: Read join command from controller
  ansible.builtin.set_fact:
    join_command: "{{ lookup('file', '/tmp/kubeadm_join_command') }}"

# ---- 2. Join the cluster ------------------------------------
- name: Check if node is already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Join Kubernetes cluster
  ansible.builtin.command: "{{ join_command }}"
  when: not kubelet_conf.stat.exists
  register: join_result

- name: Show join result
  ansible.builtin.debug:
    var: join_result.stdout_lines
  when: join_result is changed

# ---- 3. Ensure kubelet is running --------------------------
- name: Enable and start kubelet on worker
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
