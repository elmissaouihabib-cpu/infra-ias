---
# ============================================================
# Master Role - Applied to the control-plane node only
# Steps:
#   1. kubeadm init
#   2. Configure kubectl for the real user & root
#   3. Deploy Calico CNI
#   4. Remove control-plane taint (make master schedulable)
#   5. Generate and store join command for workers
# ============================================================

# Determine the real (non-root) user even when become: true
- name: Set kube user facts
  ansible.builtin.set_fact:
    kube_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    kube_home: "/home/{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

# ---- 1. kubeadm init ----------------------------------------
- name: Check if admin.conf exists (previous init)
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_done

- name: Check if kube-apiserver is actually responding
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 10
  register: api_check
  failed_when: false
  changed_when: false
  when: kubeadm_init_done.stat.exists

- name: Reset broken cluster (admin.conf present but API unreachable)
  ansible.builtin.command: kubeadm reset --force
  when:
    - kubeadm_init_done.stat.exists
    - api_check.failed | default(false)

- name: Initialize Kubernetes control plane
  ansible.builtin.command: >
    kubeadm init
    --apiserver-advertise-address={{ master_ip }}
    --apiserver-cert-extra-sans={{ master_ip }}
    --pod-network-cidr={{ pod_network_cidr }}
    --service-cidr={{ service_cidr }}
    --node-name=k8s-master
    --ignore-preflight-errors=NumCPU,Mem
  when: >
    not kubeadm_init_done.stat.exists or
    (api_check.failed | default(false))
  register: kubeadm_init_output

- name: Wait for kube-apiserver to be ready after init
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 120
  when: kubeadm_init_output is changed

# ---- 2. Configure kubectl -----------------------------------
- name: Create .kube directory for {{ kube_user }}
  ansible.builtin.file:
    path: "{{ kube_home }}/.kube"
    state: directory
    owner: "{{ kube_user }}"
    group: "{{ kube_user }}"
    mode: "0755"

- name: Copy admin.conf to {{ kube_user }}'s .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ kube_home }}/.kube/config"
    remote_src: true
    owner: "{{ kube_user }}"
    group: "{{ kube_user }}"
    mode: "0600"

- name: Create .kube directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Copy admin.conf to root's .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"

- name: Set KUBECONFIG in {{ kube_user }}'s .bashrc
  ansible.builtin.lineinfile:
    path: "{{ kube_home }}/.bashrc"
    line: "export KUBECONFIG={{ kube_home }}/.kube/config"
    state: present

# ---- 3. Deploy Calico CNI ----------------------------------
- name: Check if Calico is already deployed
  ansible.builtin.command: kubectl get ns calico-system
  become: false
  environment:
    KUBECONFIG: "{{ kube_home }}/.kube/config"
  register: calico_ns
  failed_when: false
  changed_when: false

- name: Download Calico operator manifest
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/tigera-operator.yaml
    dest: /tmp/tigera-operator.yaml
    mode: "0644"
  when: calico_ns.rc != 0

- name: Apply Calico operator
  ansible.builtin.command: kubectl apply --server-side --force-conflicts -f /tmp/tigera-operator.yaml
  become: false
  environment:
    KUBECONFIG: "{{ kube_home }}/.kube/config"
  when: calico_ns.rc != 0

- name: Deploy Calico custom resources (with pod CIDR)
  ansible.builtin.template:
    src: calico-custom-resources.yaml.j2
    dest: /tmp/calico-custom-resources.yaml
    mode: "0644"
  when: calico_ns.rc != 0

- name: Apply Calico custom resources
  ansible.builtin.command: kubectl apply --server-side -f /tmp/calico-custom-resources.yaml
  become: false
  environment:
    KUBECONFIG: "{{ kube_home }}/.kube/config"
  when: calico_ns.rc != 0

- name: Wait for control-plane node to be Ready
  ansible.builtin.command: >
    kubectl wait node k8s-master
    --for=condition=Ready
    --timeout=180s
  become: false
  environment:
    KUBECONFIG: "{{ kube_home }}/.kube/config"
  register: node_ready
  retries: 6
  delay: 30
  until: node_ready.rc == 0

# ---- 4. Remove control-plane taint (make master schedulable) ----
- name: Remove NoSchedule taint from control-plane node
  ansible.builtin.command: >
    kubectl taint nodes k8s-master
    node-role.kubernetes.io/control-plane:NoSchedule-
  become: false
  environment:
    KUBECONFIG: "{{ kube_home }}/.kube/config"
  register: taint_remove
  failed_when:
    - taint_remove.rc != 0
    - '"not found" not in taint_remove.stderr'
  changed_when: taint_remove.rc == 0

# ---- 5. Generate join command for workers ------------------
- name: Generate kubeadm join token
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false

- name: Store join command in a fact
  ansible.builtin.set_fact:
    join_command: "{{ join_command_raw.stdout }}"

- name: Save join command to a file on master
  ansible.builtin.copy:
    content: "{{ join_command }}"
    dest: /tmp/kubeadm_join_command
    mode: "0600"

- name: Fetch join command to Ansible controller
  ansible.builtin.fetch:
    src: /tmp/kubeadm_join_command
    dest: /tmp/kubeadm_join_command
    flat: true
