# ============================================================
# Ansible Inventory - Kubernetes Cluster
# Architecture: Master on host machine | Workers in Vagrant VMs
# ============================================================

[masters]
# Master runs directly on the host machine (local connection)
k8s-master ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[workers]
k8s-worker1 ansible_host=192.168.56.11
k8s-worker2 ansible_host=192.168.56.12

[k8s:children]
masters
workers

[workers:vars]
ansible_user=vagrant
ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_python_interpreter=/usr/bin/python3
